<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatIf AI – Predictive Counterfactual Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #F8F9FA;
            font-family: 'Space Grotesk', sans-serif;
            user-select: none;
        }

        /* Neural canvas: always behind everything */
        #neural-canvas {
            position: fixed;
            inset: 0; width: 100%; height: 100%;
            z-index: 0; opacity: 0;
            pointer-events: none;
        }

        #scene {
            position: relative; z-index: 1;
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        /*
         * #motion-wrapper is the ONLY element that receives the
         * global antigravity y/x drift. All SVG ring rotations
         * use svgOrigin:"500 430" — fully decoupled.
         */
        #motion-wrapper {
            display: flex; flex-direction: column;
            align-items: center;
            width: min(575px, 84vw);
            opacity: 0;
        }

        #emblem-svg {
            width: 100%; height: auto;
            display: block; overflow: visible;
        }

        /* ── Light Theme Typography ─────────────────────── */
        .brand-text {
            font-size: clamp(1.8rem, 4.4vw, 2.9rem);
            font-weight: 700; letter-spacing: 0.1em;
            color: #1E293B;                  /* dark slate */
            text-align: center; line-height: 1;
            opacity: 0; margin-top: 0.9rem;
        }
        .brand-ai {
            color: transparent;
            background: linear-gradient(90deg, #00A8D6, #0060C0);
            -webkit-background-clip: text; background-clip: text;
            margin-left: 0.15em;
            filter: drop-shadow(0 1px 3px rgba(0,60,120,0.20));
        }
        .tagline-text {
            margin-top: 0.52rem;
            font-size: clamp(0.56rem, 0.98vw, 0.70rem);
            font-weight: 500; letter-spacing: 0.26em;
            color: #64748B;                  /* medium slate */
            text-transform: uppercase;
            text-align: center; opacity: 0;
        }

        /* Premium Spinner Container replaces workspace button */
        .spinner-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 1.80rem;
            opacity: 0;
        }
        .premium-spinner {
            animation: rotate-spinner 2s linear infinite;
            width: 34px; height: 34px;
        }
        .premium-spinner .path {
            stroke: #0056B3;
            stroke-linecap: round;
            animation: dash-spinner 1.5s ease-in-out infinite;
        }
        .spinner-text {
            margin-top: 0.82rem;
            font-size: 0.64rem; font-weight: 600;
            letter-spacing: 0.24em; color: #64748B;
            text-transform: uppercase;
            font-family: 'Space Grotesk', sans-serif;
            min-height: 1.2rem; text-align: center;
        }
        @keyframes rotate-spinner {
            100% { transform: rotate(360deg); }
        }
        @keyframes dash-spinner {
            0% { stroke-dasharray: 1, 150; stroke-dashoffset: 0; }
            50% { stroke-dasharray: 90, 150; stroke-dashoffset: -35; }
            100% { stroke-dasharray: 90, 150; stroke-dashoffset: -124; }
        }
    </style>
</head>
<body>

<canvas id="neural-canvas"></canvas>

<div id="scene">
  <div id="motion-wrapper">

    <!--
    ╔══════════════════════════════════════════════════════════╗
    ║  SVG viewBox = "0 0 1000 900"                           ║
    ║  Ring centre = (500, 430)  |  Radii: 210 | 155 | 100   ║
    ║                                                          ║
    ║  PAINT ORDER (back → front):                            ║
    ║   1  .rings-group        orange concentric ring HUD     ║
    ║   2  .crescent-inner     corporate-blue left arc 7→11   ║
    ║   3  .crescent-outer     corporate-blue accent 9→1      ║
    ║   4  .core-symbol-group  6-node decision tree (exact)   ║
    ║   5  .slash-group        ink-blue curved blade          ║
    ║   6  .arc-group          radar oscillation arc          ║
    ╚══════════════════════════════════════════════════════════╝
    -->
    <svg id="emblem-svg" viewBox="0 0 1000 900">
      <defs>

        <!--
          id="slash-gradient" — referenced by the user-specified slash path.
          Deep corporate blue core → lighter cyan at the tips,
          fading to transparent so the ends dissolve cleanly.
          Gradient direction matches the path: bottom-left → top-right.
        -->
        <linearGradient id="slash-gradient" x1="0%" y1="100%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#0056B3" stop-opacity="0.00"/>
          <stop offset="22%"  stop-color="#0056B3" stop-opacity="0.95"/>
          <stop offset="55%"  stop-color="#0078D4" stop-opacity="1.00"/>
          <stop offset="80%"  stop-color="#00A8D6" stop-opacity="0.92"/>
          <stop offset="100%" stop-color="#00C2F0" stop-opacity="0.00"/>
        </linearGradient>

        <!-- Inner crescent: fades at top/bottom arc tips -->
        <linearGradient id="g-ci" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%"   stop-color="#0056B3" stop-opacity="0.00"/>
          <stop offset="20%"  stop-color="#0056B3" stop-opacity="1.00"/>
          <stop offset="80%"  stop-color="#0056B3" stop-opacity="1.00"/>
          <stop offset="100%" stop-color="#0056B3" stop-opacity="0.00"/>
        </linearGradient>

        <!-- Outer crescent accent: fades left→right -->
        <linearGradient id="g-co" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#0056B3" stop-opacity="0.00"/>
          <stop offset="18%"  stop-color="#0078D4" stop-opacity="0.70"/>
          <stop offset="55%"  stop-color="#0078D4" stop-opacity="0.70"/>
          <stop offset="100%" stop-color="#0056B3" stop-opacity="0.00"/>
        </linearGradient>

        <!-- ── Filters (all feDropShadow — no neon glow) ─── -->

        <!-- Heavy blue drop-shadow: inner crescent depth halo -->
        <filter id="f-cyan-heavy" x="-22%" y="-22%" width="144%" height="144%">
          <feDropShadow dx="0" dy="4" stdDeviation="7"
                        flood-color="#0056B3" flood-opacity="0.20"/>
        </filter>

        <!-- Medium blue drop-shadow: crescent body + radar arc -->
        <filter id="f-cyan" x="-16%" y="-16%" width="132%" height="132%">
          <feDropShadow dx="0" dy="2" stdDeviation="4"
                        flood-color="#0056B3" flood-opacity="0.16"/>
        </filter>

        <!-- Soft blue drop-shadow: secondary elements -->
        <filter id="f-soft" x="-12%" y="-12%" width="124%" height="124%">
          <feDropShadow dx="0" dy="1" stdDeviation="2.5"
                        flood-color="#0056B3" flood-opacity="0.12"/>
        </filter>

        <!-- Ink-blue drop-shadow: slash depth -->
        <filter id="f-slash" x="-14%" y="-14%" width="128%" height="128%">
          <feDropShadow dx="0" dy="3" stdDeviation="5"

        </filter>

        <!-- Orange drop-shadow: ring junction nodes -->

          <!-- middle r=155 -->

          <circle cx="345" cy="430" r="4.5" fill="#FF8C00" class="jnode"/>

          <!-- inner r=100 -->
          <circle cx="600" cy="430" r="3.5" fill="#FFA726" class="jnode"/>

      </g><!-- /PAINT LAYER 1 -->


      <!-- ════════════════════════════════════════════════════
           PAINT LAYER 2 — INNER THICK CRESCENT  (7→11 o'clock)
           r=125 from centre (500,430)
             7  o'clock = SVG 120° → (438, 538)

           ════════════════════════════════════════════════════ -->

             vertical midpoint = (340+460)/2 = 400 ✓

             ⑤ M 560,400 → 560,460  right drop      N3→N5

           6 nodes — every node attached to at least one line:
             N1 (500,340)  N2 (440,400)  N3 (560,400)
             N4 (440,460)  N5 (560,460)  N6 (500,460)
      -->

          <!-- ① Left diagonal: N1 → N2 -->
          <path d="M 500,340 L 440,400" stroke="#0056B3" stroke-width="3.5" stroke-linecap="round" fill="none" class="draw-path" />
          <!-- ② Right diagonal: N1 → N3 -->
          <path d="M 500,340 L 560,400" stroke="#0056B3" stroke-width="3.5" stroke-linecap="round" fill="none" class="draw-path" />

          <!-- ④ Left drop: N2 → N4 -->

          <path d="M 560,400 L 560,460" stroke="#0056B3" stroke-width="3.5" stroke-linecap="round" fill="none" class="draw-path" />

          <!-- N1: Root — Top Centre (500, 340) -->
          <circle cx="500" cy="340" r="8" fill="#FFFFFF" stroke="#0056B3" stroke-width="2.5" />
          <circle cx="500" cy="340" r="3" fill="#0056B3" />
          <!-- N2: Middle Left (440, 400) -->

          <!-- N3: Middle Right (560, 400) -->

      <!-- ════════════════════════════════════════════════════

           Control point (480, 380) pulls the curve shallowly

<script>
/* ═══════════════════════════════════════════════════════════════
   GSAP MASTER SEQUENCE & NEURAL NETWORK CANVAS
   Canvas particles act as a subtle slate-gray watermark.
   Automatic progress telemetry ingestion redirects to dashboard.
   ═══════════════════════════════════════════════════════════════ */

(function initNeural() {
    const canvas = document.getElementById('neural-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');

    let width, height;
    const dpr = window.devicePixelRatio || 1;

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width * dpr;
        canvas.height = height * dpr;
        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';
        ctx.scale(dpr, dpr);
    }
    resize();

    const particles = [];
    const maxParticles = Math.min(80, Math.floor((width * height) / 15000));
    const connectionDist = 120;
    const baseSpeed = 0.45;

    class Particle {
        constructor() {
            this.x = Math.random() * width;
            this.y = Math.random() * height;
            this.vx = (Math.random() - 0.5) * baseSpeed;
            this.vy = (Math.random() - 0.5) * baseSpeed;
            this.radius = Math.random() * 1.5 + 1.2;
            this.alpha = Math.random() * 0.5 + 0.3;
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;

            // Boundary collision
            if (this.x < 0 || this.x > width) this.vx = -this.vx;
            if (this.y < 0 || this.y > height) this.vy = -this.vy;
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(203, 213, 225, ${this.alpha})`; // Slate watermark gray
            ctx.fill();
        }
    }

    for (let i = 0; i < maxParticles; i++) {
        particles.push(new Particle());
    }

    const mouse = { x: null, y: null, radius: 140 };

    window.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });

    window.addEventListener('mouseleave', () => {
        mouse.x = null;
        mouse.y = null;
    });

    function animate() {
        ctx.clearRect(0, 0, width, height);

        // Update and draw connections
        for (let i = 0; i < particles.length; i++) {
            const p1 = particles[i];
            
            // Mouse interaction (gentle attraction/repulsion + connection)
            if (mouse.x !== null && mouse.y !== null) {
                const dx = p1.x - mouse.x;
                const dy = p1.y - mouse.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < mouse.radius) {
                    ctx.beginPath();
                    ctx.strokeStyle = `rgba(0, 86, 179, ${(1 - dist / mouse.radius) * 0.12})`;
                    ctx.lineWidth = 0.6;
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(mouse.x, mouse.y);
                    ctx.stroke();

                    // Gentle push
                    const force = (mouse.radius - dist) / mouse.radius;
                    p1.vx += (dx / dist) * force * 0.03;
                    p1.vy += (dy / dist) * force * 0.03;
                }
            }

            p1.update();

            // Clamp particle speed
            const speed = Math.sqrt(p1.vx * p1.vx + p1.vy * p1.vy);
            if (speed > baseSpeed * 1.8) {
                p1.vx = (p1.vx / speed) * baseSpeed * 1.8;
                p1.vy = (p1.vy / speed) * baseSpeed * 1.8;
            }
            // Add slight friction to decelerate back to base speed
            p1.vx *= 0.98;
            p1.vy *= 0.98;

            p1.draw();

            for (let j = i + 1; j < particles.length; j++) {
                const p2 = particles[j];
                const dx = p1.x - p2.x;
                const dy = p1.y - p2.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < connectionDist) {
                    const alpha = (1 - dist / connectionDist) * 0.35;
                    ctx.beginPath();
                    ctx.strokeStyle = `rgba(226, 232, 240, ${alpha})`;
                    ctx.lineWidth = 0.75;
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();
                }
            }
        }

        requestAnimationFrame(animate);
    }

    window.addEventListener('resize', () => {
        resize();
        const newCount = Math.min(80, Math.floor((width * height) / 15000));
        while(particles.length < newCount) {
            particles.push(new Particle());
        }
        if (particles.length > newCount) {
            particles.length = newCount;
        }
    });

    animate();
})();

document.addEventListener('DOMContentLoaded', () => {

    /* strokeDashoffset setup for longer curved paths only.
       Tree paths (.draw-path) use opacity animation. */
    ['draw-path-slash', 'dc-inner', 'dc-outer', 'draw-arc'].forEach(cls => {
        document.querySelectorAll(`.${cls}`).forEach(el => {
            const L = el.getTotalLength();
            el.style.strokeDasharray  = L;
            el.style.strokeDashoffset = L;
        });
    });

    /* ── Initial hidden states ── */
    gsap.set('#motion-wrapper',       { opacity: 0, scale: 0.90 });
    gsap.set('.core-symbol-group',    { opacity: 0 });
    gsap.set('.rings-group',          { scale: 0, svgOrigin: '500 430' });
    gsap.set('.jnode',                { scale: 0 });
    gsap.set('.slash-group',          { opacity: 0 });
    gsap.set('.crescent-inner-group', { opacity: 0 });
    gsap.set('.crescent-outer-group', { opacity: 0 });
    gsap.set('.arc-group',            { opacity: 0 });
    gsap.set('.spinner-container',    { opacity: 0 });

    const tl = gsap.timeline({ defaults: { ease: 'power2.out' } });

    /* ── PHASE 1 — Wrapper rises + tree fades in ── */
    tl.to('#motion-wrapper', { opacity: 1, scale: 1, duration: 1.8 }, 0.10);
    tl.to('.core-symbol-group', { opacity: 1, duration: 0.90, ease: 'power2.inOut' }, 0.40);

    /* ── PHASE 2 — Ring system elastic spring ── */
    tl.to('.rings-group', {
        scale: 1, duration: 1.90,
        ease: 'elastic.out(1, 0.76)',
        svgOrigin: '500 430'
    }, 0.80);

    tl.to('.jnode', {
        scale: 1, duration: 0.38,
        ease: 'back.out(1.7)',
        stagger: { amount: 0.50, from: 'center' }
    }, 1.60);

    /* ── PHASE 3 — Crescents sweep in ── */
    tl.to('.crescent-inner-group', { opacity: 1, duration: 0.18 }, 1.65);
    tl.to('.dc-inner', { strokeDashoffset: 0, duration: 1.00, ease: 'power3.out' }, 1.67);

    tl.to('.crescent-outer-group', { opacity: 1, duration: 0.18 }, 1.90);
    tl.to('.dc-outer', { strokeDashoffset: 0, duration: 0.86, ease: 'power3.out' }, 1.92);

    /* ── PHASE 4 — Curved energy slash streaks across ── */
    tl.to('.slash-group', { opacity: 1, duration: 0.05 }, 1.22);
    tl.to('.draw-path-slash', { strokeDashoffset: 0, duration: 0.76, ease: 'power4.out' }, 1.24);

    /* ── PHASE 5 — Radar arc ── */
    tl.to('.arc-group', { opacity: 1, duration: 0.20 }, 2.06);
    tl.to('.draw-arc', { strokeDashoffset: 0, duration: 0.88, ease: 'power3.out' }, 2.08);

    /* ── PHASE 6 — Typography ── */
    tl.fromTo('.brand-text',
        { opacity: 0, y: 14, letterSpacing: '0.02em' },
        { opacity: 1, y: 0,  letterSpacing: '0.1em', duration: 1.0, ease: 'power4.out' }, 2.14);

    tl.fromTo('.tagline-text',
        { opacity: 0, y: 8 },
        { opacity: 1, y: 0, duration: 0.85, ease: 'power3.out' }, 2.46);

    /* Fade in the premium loading spinner instead of the button */
    tl.to('.spinner-container', { opacity: 1, duration: 0.85 }, 2.72);

    /* Fade in neural canvas watermark */
    gsap.to('#neural-canvas', { opacity: 0.75, duration: 2.5, ease: 'power1.inOut' });

    /* ── TELEMETRY PROGRESS & REDIRECT STAGES ── */
    const statusEl = document.getElementById('spinner-status');
    
    gsap.delayedCall(4.0, () => {
        if (statusEl) statusEl.textContent = "Mapping AST dependencies...";
    });

    gsap.delayedCall(5.3, () => {
        if (statusEl) statusEl.textContent = "Analyzing commit co-changes...";
    });

    gsap.delayedCall(6.6, () => {
        if (statusEl) statusEl.textContent = "Launching Chronos Engine...";
    });

    // Elegant fade out transition before redirect
    gsap.delayedCall(7.8, () => {
        gsap.to('#motion-wrapper', { opacity: 0, scale: 0.95, duration: 0.8, ease: 'power2.inOut' });
        gsap.to('#neural-canvas', { opacity: 0, duration: 0.8, ease: 'power2.inOut' });
    });

    // Final dashboard load
    gsap.delayedCall(8.6, () => {
        window.location.href = "dashboard_mockup.html";
    });

    /* ═══════════════════════════════════════════════════════════
       PERSISTENT IDLE LOOPS
       ═══════════════════════════════════════════════════════════ */

    /* Whole ring HUD: slow CW rotation */
    gsap.to('.rings-group', {
        rotation: 360, svgOrigin: '500 430',
        duration: 54, repeat: -1, ease: 'none'

    /* Inner dashed tracker: fast CCW counter-rotation */

    /* Radar arc: oscillating angular sweep */
    gsap.to('.arc-group', {
        rotation: '+=52', svgOrigin: '500 430',

    /* Junction nodes: staggered breathing pulse */

    /* Tree node inner dots: subtle size pulse */

        ease: 'sine.inOut', stagger: 0.28

    gsap.to('.crescent-inner-group', {

        ease: 'sine.inOut', delay: 2.8

    /* Outer accent breathe (out of phase) */
    gsap.to('.crescent-outer-group', {
        opacity: 0.55, duration: 2.8, repeat: -1, yoyo: true,
        ease: 'sine.inOut', delay: 3.6

    gsap.to('.slash-group', {
        opacity: 0.42, duration: 3.5, repeat: -1, yoyo: true,
        ease: 'sine.inOut', delay: 2.1

    /* Global antigravity drift — wrapper div ONLY, never SVG elements */
    gsap.to('#motion-wrapper', {
        y: '+=10', x: '+=3.5',
        duration: 7.5, repeat: -1,
        yoyo: true, ease: 'sine.inOut'
    });
});
